<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delphi V3 API Reference</title>
<style>
  :root {
    --bg: #f8f9fb;
    --surface: #fff;
    --border: #e2e6ed;
    --text: #1a1d23;
    --text-secondary: #5f6775;
    --accent: #4f6ef7;
    --accent-hover: #3b5ae0;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
    --radius: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-lg: 0 4px 12px rgba(0,0,0,.08);
    --get: #16a34a;
    --post: #2563eb;
    --put: #d97706;
    --patch: #7c3aed;
    --delete: #dc2626;
    --get-bg: #f0fdf4;
    --post-bg: #eff6ff;
    --put-bg: #fffbeb;
    --patch-bg: #f5f3ff;
    --delete-bg: #fef2f2;
    --sidebar-w: 240px;
    --topbar-h: 64px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; scroll-padding-top: calc(var(--topbar-h) + 24px); }
  body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; font-size: 14px; }

  /* ── Top Bar ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--topbar-h); background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    padding: 0 24px; box-shadow: var(--shadow);
  }
  .topbar .logo { font-weight: 700; font-size: 16px; color: var(--accent); white-space: nowrap; letter-spacing: -.3px; }
  .topbar .logo span { color: var(--text-secondary); font-weight: 400; font-size: 13px; margin-left: 6px; }
  .topbar .fields { display: flex; gap: 10px; flex: 1; max-width: 720px; }
  .topbar input {
    flex: 1; min-width: 0; padding: 7px 12px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px; font-family: var(--mono);
    background: var(--bg); transition: border-color .15s;
  }
  .topbar input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,110,247,.12); }
  .topbar input::placeholder { color: #aab0bc; }
  .topbar .status { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .topbar .status.ok { color: var(--get); }

  /* ── Sidebar ── */
  .sidebar {
    position: fixed; top: var(--topbar-h); left: 0; bottom: 0;
    width: var(--sidebar-w); background: var(--surface);
    border-right: 1px solid var(--border); padding: 20px 0;
    overflow-y: auto;
  }
  .sidebar h3 {
    padding: 6px 20px; font-size: 10px; text-transform: uppercase;
    letter-spacing: .8px; color: #9ca3af; margin-top: 12px;
  }
  .sidebar h3:first-child { margin-top: 0; }
  .sidebar a {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 20px; text-decoration: none; color: var(--text-secondary);
    font-size: 13px; transition: all .12s; border-left: 2px solid transparent;
  }
  .sidebar a:hover { color: var(--text); background: var(--bg); }
  .sidebar a .method-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  /* ── Main ── */
  .main {
    margin-left: var(--sidebar-w); margin-top: var(--topbar-h);
    padding: 32px 40px 80px;
    max-width: 920px;
  }
  .main > h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
  .main > .subtitle { color: var(--text-secondary); margin-bottom: 32px; font-size: 15px; }

  .section-title {
    font-size: 20px; font-weight: 700; margin: 40px 0 16px;
    padding-bottom: 8px; border-bottom: 2px solid var(--border);
  }

  /* ── Endpoint Card ── */
  .endpoint {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 16px;
    box-shadow: var(--shadow); overflow: hidden;
  }
  .endpoint-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; cursor: pointer; user-select: none;
    transition: background .1s;
  }
  .endpoint-header:hover { background: var(--bg); }
  .method-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 60px; padding: 3px 10px; border-radius: 4px;
    font-size: 11px; font-weight: 700; font-family: var(--mono);
    text-transform: uppercase; letter-spacing: .3px; color: #fff;
  }
  .method-badge.get    { background: var(--get); }
  .method-badge.post   { background: var(--post); }
  .method-badge.put    { background: var(--put); }
  .method-badge.patch  { background: var(--patch); }
  .method-badge.delete { background: var(--delete); }
  .endpoint-path { font-family: var(--mono); font-size: 13px; font-weight: 600; flex: 1; }
  .endpoint-desc { font-size: 12px; color: var(--text-secondary); }
  .endpoint-chevron { font-size: 18px; color: #c5c9d2; transition: transform .2s; }
  .endpoint.open .endpoint-chevron { transform: rotate(90deg); }

  .endpoint-body { display: none; border-top: 1px solid var(--border); }
  .endpoint.open .endpoint-body { display: block; }

  .endpoint-section { padding: 16px 18px; }
  .endpoint-section + .endpoint-section { border-top: 1px solid var(--border); }
  .endpoint-section h4 {
    font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
    color: #9ca3af; margin-bottom: 8px;
  }

  /* Params table */
  .params-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .params-table th {
    text-align: left; font-size: 11px; text-transform: uppercase;
    letter-spacing: .5px; color: #9ca3af; padding: 4px 12px 4px 0;
    border-bottom: 1px solid var(--border); font-weight: 500;
  }
  .params-table td { padding: 6px 12px 6px 0; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
  .params-table code { font-family: var(--mono); font-size: 12px; background: #f3f4f6; padding: 1px 5px; border-radius: 3px; }
  .params-table .required { color: var(--delete); font-size: 10px; font-weight: 600; }
  .params-table .optional { color: #9ca3af; font-size: 10px; }

  /* Curl block */
  .curl-block {
    position: relative; background: #1e1e2e; color: #cdd6f4;
    border-radius: 6px; padding: 14px 16px; font-family: var(--mono);
    font-size: 12px; line-height: 1.7; overflow-x: auto; white-space: pre-wrap;
    word-break: break-all;
  }
  .curl-block .kw { color: #89b4fa; }
  .curl-block .str { color: #a6e3a1; }
  .curl-block .flag { color: #f9e2af; }

  /* Action buttons row */
  .actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 6px; font-size: 12px;
    font-weight: 600; border: none; cursor: pointer;
    transition: all .12s; font-family: var(--font);
  }
  .btn-copy { background: #f3f4f6; color: var(--text-secondary); }
  .btn-copy:hover { background: #e5e7eb; color: var(--text); }
  .btn-send { background: var(--accent); color: #fff; }
  .btn-send:hover { background: var(--accent-hover); }

  /* Response panel */
  .response-panel { margin-top: 12px; display: none; }
  .response-panel.visible { display: block; }
  .response-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; background: #f8f9fb; border-radius: 6px 6px 0 0;
    border: 1px solid var(--border); border-bottom: none;
    font-size: 12px;
  }
  .status-code { font-family: var(--mono); font-weight: 700; padding: 2px 8px; border-radius: 4px; }
  .status-code.s2xx { background: var(--get-bg); color: var(--get); }
  .status-code.s4xx { background: #fef3c7; color: #92400e; }
  .status-code.s5xx { background: var(--delete-bg); color: var(--delete); }
  .status-code.serr { background: #fef2f2; color: var(--delete); }
  .response-time { color: var(--text-secondary); font-family: var(--mono); font-size: 11px; }
  .response-bar .spacer { flex: 1; }
  .btn-copy-resp {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 8px; font-size: 11px; cursor: pointer; color: var(--text-secondary);
    font-family: var(--font); transition: all .12s; display: flex; align-items: center; gap: 4px;
  }
  .btn-copy-resp:hover { background: #e5e7eb; color: var(--text); }
  .btn-copy-resp.copied { background: var(--get-bg); color: var(--get); border-color: #bbf7d0; }
  .response-body {
    background: #1e1e2e; color: #cdd6f4; border-radius: 0 0 6px 6px;
    padding: 14px 16px; font-family: var(--mono); font-size: 12px;
    line-height: 1.6; overflow-x: auto; max-height: 400px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-all;
    border: 1px solid #313244;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    background: #1e1e2e; color: #cdd6f4; padding: 10px 18px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-lg); opacity: 0; transform: translateY(8px);
    transition: all .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Mode banner */
  .mode-banner {
    padding: 10px 18px; font-size: 12px; border-radius: 6px;
    margin-bottom: 24px; display: flex; align-items: center; gap: 8px;
  }
  .mode-banner.proxy { background: var(--get-bg); color: #15803d; border: 1px solid #bbf7d0; }
  .mode-banner.static { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
  .mode-banner .dot { width: 8px; height: 8px; border-radius: 50%; }
  .mode-banner.proxy .dot { background: var(--get); }
  .mode-banner.static .dot { background: #f59e0b; }

  /* Paste fallback */
  .paste-area {
    width: 100%; min-height: 80px; max-height: 200px; margin-top: 8px;
    padding: 10px 12px; border: 1px dashed var(--border); border-radius: 6px;
    font-family: var(--mono); font-size: 12px; background: var(--bg);
    resize: vertical; display: none;
  }
  .paste-area.visible { display: block; }
  .btn-format { background: #f3f4f6; color: var(--text-secondary); display: none; }
  .btn-format.visible { display: inline-flex; }
  .btn-format:hover { background: #e5e7eb; color: var(--text); }

  /* Validation */
  .field-invalid {
    border-color: var(--delete) !important;
    box-shadow: 0 0 0 3px rgba(220, 38, 38, .12) !important;
    animation: shake .4s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-4px); }
    40%, 80% { transform: translateX(4px); }
  }
  /* Resolved user badge */
  .resolved-user {
    display: flex; align-items: center; gap: 6px;
    background: var(--get-bg); border: 1px solid #bbf7d0;
    border-radius: 6px; padding: 4px 10px;
    font-size: 11px; white-space: nowrap;
    animation: fadeIn .25s ease;
  }
  .resolved-user.loading { background: #f3f4f6; border-color: var(--border); }
  .resolved-user .uid-label { color: var(--text-secondary); }
  .resolved-user code {
    font-family: var(--mono); font-size: 11px; color: var(--get); font-weight: 600;
    max-width: 110px; overflow: hidden; text-overflow: ellipsis; display: inline-block;
  }
  .resolved-user.loading code { color: var(--text-secondary); }
  .resolved-copy {
    background: none; border: none; cursor: pointer;
    font-size: 11px; padding: 0 2px; opacity: .5; transition: opacity .15s;
  }
  .resolved-copy:hover { opacity: 1; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }

  /* Streaming response */
  .stream-panel { margin-top: 12px; display: none; }
  .stream-panel.visible { display: block; }
  .stream-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; background: #f8f9fb; border-radius: 6px 6px 0 0;
    border: 1px solid var(--border); border-bottom: none; font-size: 12px;
  }
  .stream-bar .spacer { flex: 1; }
  .stream-status { font-family: var(--mono); font-weight: 700; padding: 2px 8px; border-radius: 4px; }
  .stream-status.streaming { background: var(--post-bg); color: var(--post); }
  .stream-status.done { background: var(--get-bg); color: var(--get); }
  .stream-status.err { background: var(--delete-bg); color: var(--delete); }
  .stream-meta { color: var(--text-secondary); font-family: var(--mono); font-size: 11px; }
  .stream-output {
    background: var(--surface); border: 1px solid var(--border); border-top: none;
    padding: 16px 18px; font-size: 14px; line-height: 1.7; min-height: 48px;
    position: relative;
  }
  .stream-output .cursor {
    display: inline-block; width: 2px; height: 1em; background: var(--accent);
    margin-left: 1px; vertical-align: text-bottom;
    animation: blink .6s steps(2) infinite;
  }
  @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0; } }
  .stream-raw {
    background: #1e1e2e; color: #cdd6f4; border-radius: 0 0 6px 6px;
    padding: 14px 16px; font-family: var(--mono); font-size: 12px;
    line-height: 1.6; overflow-x: auto; max-height: 300px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-all; border: 1px solid #313244;
    border-top: none; display: none;
  }
  .stream-raw.visible { display: block; }
  .stream-toggle {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 8px; font-size: 11px; cursor: pointer; color: var(--text-secondary);
    font-family: var(--font); transition: all .12s;
  }
  .stream-toggle:hover { background: #e5e7eb; color: var(--text); }
  .stream-toggle.active { background: var(--post-bg); color: var(--post); border-color: #bfdbfe; }

  /* Auto-filled fields */
  .ep-extra.auto-filled {
    border-color: var(--get) !important;
    background: var(--get-bg) !important;
  }
  select.ep-extra.auto-filled {
    border-color: var(--get) !important;
    background: var(--get-bg) !important;
  }

  /* ── Voice Chat Widget ── */
  .voice-widget {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    margin-bottom: 24px; overflow: hidden;
  }
  .voice-widget-toggle {
    width: 100%; padding: 12px 16px; background: none; border: none;
    font-family: var(--font); font-size: 14px; font-weight: 600;
    color: var(--accent); cursor: pointer; text-align: left;
    display: flex; align-items: center; gap: 8px;
    transition: background .15s;
  }
  .voice-widget-toggle:hover { background: var(--post-bg); }
  .voice-widget-toggle .vw-chevron { font-size: 10px; transition: transform .2s; }
  .voice-widget.open .vw-chevron { transform: rotate(90deg); }
  .voice-widget-body { display: none; border-top: 1px solid var(--border); }
  .voice-widget.open .voice-widget-body { display: flex; flex-direction: column; }
  .vw-chat {
    height: 350px; overflow-y: auto; padding: 12px; display: flex;
    flex-direction: column; gap: 10px; background: var(--bg);
  }
  .vw-chat:empty::after {
    content: "Send a message to start a voice conversation";
    color: var(--text-secondary); font-size: 13px; margin: auto; text-align: center;
  }
  .vw-msg { display: flex; flex-direction: column; max-width: 72%; animation: fadeIn .2s ease; }
  .vw-msg.user { align-self: flex-end; align-items: flex-end; }
  .vw-msg.clone { align-self: flex-start; align-items: flex-start; }
  .vw-bubble {
    padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.5; word-break: break-word;
  }
  .vw-msg.user .vw-bubble { background: #eff6ff; border: 1px solid #bfdbfe; border-bottom-right-radius: 3px; }
  .vw-msg.clone .vw-bubble { background: #f3f4f6; border: 1px solid #d1d5db; border-bottom-left-radius: 3px; }
  .vw-msg.clone .vw-bubble.vw-error { background: #fef2f2; border-color: #fecaca; color: var(--delete); }
  .vw-meta { font-size: 10px; color: var(--text-secondary); margin-top: 3px; padding: 0 4px; }
  .vw-audio-player { margin-top: 6px; display: flex; align-items: center; gap: 6px; }
  .vw-audio-player button {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: var(--accent); color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    flex-shrink: 0; transition: background .15s;
  }
  .vw-audio-player button:hover { background: var(--accent-hover); }
  .vw-progress-wrap {
    flex: 1; height: 5px; background: #e5e7eb; border-radius: 3px;
    overflow: hidden; cursor: pointer;
  }
  .vw-progress-bar { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; transition: width .1s linear; }
  .vw-dur { font-size: 10px; color: var(--text-secondary); font-family: var(--mono); min-width: 36px; text-align: right; }
  .vw-loading span {
    display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-secondary); margin: 0 2px;
    animation: vwBounce .6s infinite alternate;
  }
  .vw-loading span:nth-child(2) { animation-delay: .2s; }
  .vw-loading span:nth-child(3) { animation-delay: .4s; }
  @keyframes vwBounce { to { opacity: .3; transform: translateY(-3px); } }
  @keyframes vwPulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
  .vw-bottom {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 12px; border-top: 1px solid var(--border); background: var(--surface);
  }
  .vw-bottom input {
    flex: 1; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px; outline: none; font-family: var(--font);
  }
  .vw-bottom input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79,110,247,.15); }
  .vw-bottom .vw-btn {
    height: 34px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 600; display: flex; align-items: center;
    justify-content: center; gap: 4px; transition: background .15s;
  }
  .vw-bottom .vw-btn-send { background: var(--accent); color: #fff; padding: 0 14px; }
  .vw-bottom .vw-btn-send:hover { background: var(--accent-hover); }
  .vw-bottom .vw-btn-send:disabled { opacity: .5; cursor: default; }
  .vw-bottom .vw-btn-mic {
    width: 34px; background: var(--bg); border: 1px solid var(--border); color: var(--text);
  }
  .vw-bottom .vw-btn-mic:hover { background: #e5e7eb; }
  .vw-bottom .vw-btn-mic.recording { background: #fef2f2; border-color: #fecaca; color: var(--delete); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { box-shadow: 0 0 0 3px rgba(220,38,38,.15); } }
  .vw-bottom .vw-btn-new {
    background: var(--bg); border: 1px solid var(--border); color: var(--text-secondary);
    padding: 0 8px; font-size: 11px;
  }
  .vw-bottom .vw-btn-new:hover { background: #e5e7eb; }
  .vw-chat::-webkit-scrollbar { width: 5px; }
  .vw-chat::-webkit-scrollbar-track { background: transparent; }
  .vw-chat::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  /* Voice widget debug panel */
  .vw-debug-toggle {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    font-family: var(--mono); font-size: 10px; color: var(--text-secondary);
    cursor: pointer; padding: 2px 6px; transition: background .15s;
  }
  .vw-debug-toggle:hover { background: var(--bg); }
  .vw-debug-toggle.active { background: #fef3c7; border-color: #fde68a; color: #92400e; }
  .vw-debug-panel {
    display: none; background: #1a1d23; color: #d4d4d8;
    font-family: var(--mono); font-size: 11px; border-top: 1px solid #3f3f46;
  }
  .vw-debug-panel.visible { display: flex; flex-direction: column; }
  .vw-debug-panel .vw-dbg-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px; background: #27272a; border-bottom: 1px solid #3f3f46;
    font-weight: 600; font-size: 10px; color: #a1a1aa;
  }
  .vw-debug-panel .vw-dbg-header button {
    background: none; border: none; color: #a1a1aa; cursor: pointer;
    font-size: 10px; font-family: var(--mono); padding: 1px 5px; border-radius: 3px;
  }
  .vw-debug-panel .vw-dbg-header button:hover { background: #3f3f46; color: #fff; }
  .vw-dbg-log {
    max-height: 180px; overflow-y: auto; padding: 6px 10px; line-height: 1.6;
  }
  .vw-dbg-log::-webkit-scrollbar { width: 4px; }
  .vw-dbg-log::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
  .vw-dbg-entry { padding: 1px 0; }
  .vw-dbg-entry .ts { color: #71717a; }
  .vw-dbg-entry .lb { font-weight: 600; }
  .vw-dbg-entry .lb.chunk { color: #22d3ee; }
  .vw-dbg-entry .lb.play { color: #a78bfa; }
  .vw-dbg-entry .lb.info { color: #facc15; }
  .vw-dbg-entry .lb.done { color: #4ade80; }
  .vw-dbg-entry .lb.err { color: #f87171; }
  .vw-dbg-stats {
    padding: 5px 10px; background: #27272a; border-top: 1px solid #3f3f46;
    display: flex; gap: 14px; font-size: 10px; color: #a1a1aa;
  }

/* ── Proxy Detection ── */
async function detectProxy() {
  // If served over HTTP (not file://), try the /api/ proxy on same origin
  if (location.protocol === "http:") {
    proxyBase = location.origin + "/api";
    try {
      // Any response (even 403) proves the proxy is forwarding — only a network error means no proxy
      await fetch(proxyBase + "/healthcheck", { method: "GET", signal: AbortSignal.timeout(2000) });
      proxyAvailable = true;
      return;
    } catch {}
  }
  proxyAvailable = false;
  proxyBase = "";
}

function updateModeBanner() {
  const el = $id("modeBanner");
  if (proxyAvailable) {
    el.innerHTML = '<div class="mode-banner proxy"><span class="dot"></span><strong>Proxy connected</strong> &mdash; Send buttons hit the API through the local proxy. No CORS issues.</div>';

/* ── Helpers ── */
function $(sel, ctx) { return (ctx || document).querySelector(sel); }
function globals() {
  return { apiKey: $id("apiKey").value.trim(), userEmail: $id("userEmail").value.trim() };
}
function $id(id) { return document.getElementById(id); }
function toast(msg) {
  const t = $id("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove("show"), 2000);
}
function getExtras(ep) {
  const out = {};
  (ep.extra || []).forEach(e => {
    const el = $id(e.id);
    if (!el) return;
    let val = el.value.trim();
    // Type-cast based on field type
    if (e.type === "integer" && val) val = String(parseInt(val, 10) || "");
    out[e.id] = val;
  });
  return out;
}

function resolvedPath(ep) {
  const g = globals(), ex = getExtras(ep);
  if (ep.pathFn) return ep.pathFn(g, ex);
  return ep.path;
}

function resolvedUrl(ep, forCurl) {
  const base = (!forCurl && proxyAvailable) ? proxyBase : DELPHI_BASE;
  let url = base + resolvedPath(ep);
  if (ep.queryFn) url += ep.queryFn(globals(), getExtras(ep));
  return url;
}

function curlUrl(ep) {
  let url = DELPHI_BASE + resolvedPath(ep);
  if (ep.queryFn) url += ep.queryFn(globals(), getExtras(ep));
  return url;
}

function resolvedBody(ep) {
  if (!ep.bodyFn) return null;
  return ep.bodyFn(globals(), getExtras(ep));
}

function buildCurl(ep) {
  const g = globals();
  const key = g.apiKey || "$DELPHI_API_KEY";
  const method = ep.method;
  const url = curlUrl(ep);
  let parts = [`curl -sS -X ${method} "${url}"`];
  parts.push(`  -H "x-api-key: ${key}"`);
  const body = resolvedBody(ep);
  if (body && Object.keys(body).length > 0) {
    parts.push(`  -H "Content-Type: application/json"`);
    parts.push(`  -d '${JSON.stringify(body)}'`);
  }
  return parts.join(" \\\n");
}

/* ── User ID Lookup ── */
let resolvedUserId = "";
let lookupTimer = null;

async function lookupUser() {
  const g = globals();
  if (!g.apiKey || !g.userEmail) { clearResolvedUser(); return; }

  // Show loading state
  const badge = $id("resolvedUser");
  const uidEl = $id("resolvedUid");
  badge.style.display = "flex";
  badge.classList.add("loading");
  uidEl.textContent = "looking up\u2026";
  uidEl.title = "";

  const url = (proxyAvailable ? proxyBase : DELPHI_BASE) + "/v3/users/lookup";
  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { "x-api-key": g.apiKey, "Content-Type": "application/json" },
      body: JSON.stringify({ email: g.userEmail })
    });
    if (res.ok) {
      const data = await res.json();
      const uid = data.user_id || data.id;
      if (uid) {
        resolvedUserId = uid;
        showResolvedUser(uid);
        autoFillUserIds();
        return;
      }
    }
  } catch {}
  clearResolvedUser();
}

function showResolvedUser(uid) {
  const badge = $id("resolvedUser");
  const uidEl = $id("resolvedUid");
  badge.style.display = "flex";
  badge.classList.remove("loading");
  uidEl.textContent = uid.length > 16 ? uid.slice(0, 8) + "\u2026" + uid.slice(-6) : uid;
  uidEl.title = uid;
}

function clearResolvedUser() {
  resolvedUserId = "";
  const badge = $id("resolvedUser");
  badge.style.display = "none";
  badge.classList.remove("loading");
  // Clear any auto-filled fields
  document.querySelectorAll(".ep-extra.auto-filled").forEach(el => {
    el.value = "";
    el.dataset.autoFilled = "";
    el.classList.remove("auto-filled");
    const idx = parseInt(el.dataset.ep, 10);
    if (!isNaN(idx)) refreshCurl(idx);
  });
}

function copyUid() {
  if (resolvedUserId) navigator.clipboard.writeText(resolvedUserId).then(() => toast("User ID copied"));
}

function autoFillUserIds() {
  if (!resolvedUserId) return;
  document.querySelectorAll('.ep-extra[data-param="user_id"]').forEach(el => {
    // Only auto-fill if empty or was previously auto-filled by us
    if (!el.value.trim() || el.dataset.autoFilled === "yes") {
      el.value = resolvedUserId;
      el.dataset.autoFilled = "yes";
      el.classList.add("auto-filled");
      el.classList.remove("field-invalid");
      const idx = parseInt(el.dataset.ep, 10);
      if (!isNaN(idx)) refreshCurl(idx);
    }
  });
}

function debouncedLookup() {
  clearTimeout(lookupTimer);
  lookupTimer = setTimeout(lookupUser, 600);
}

  if (!params || !params.length) return "";

  params.forEach(p => {
    const badge = p.req ? '<span class="required">required</span>' : '<span class="optional">optional</span>';
    html += `<tr><td><code>${p.name}</code></td><td>${p.type || "string"}</td><td>${badge}</td><td>${p.desc}</td></tr>`;
  });
  html += "</tbody></table></div>";
  return html;
}

function renderExtras(ep, idx) {
  if (!ep.extra || !ep.extra.length) return "";
  let html = '<div class="endpoint-section"><h4>Parameters</h4><div style="display:flex;flex-direction:column;gap:6px">';
  ep.extra.forEach(e => {
    const isReq = e.req !== false;
    const reqMark = isReq ? ' *' : '';
    html += `<div style="display:flex;align-items:center;gap:8px">`;
    html += `<label style="min-width:120px;font-size:12px;color:var(--text-secondary);font-weight:500;text-align:right;white-space:nowrap" for="${e.id}">${e.label}${reqMark}</label>`;
    if (e.type === "select" && e.options) {
      html += `<select id="${e.id}" style="flex:1;min-width:0;padding:6px 10px;border:1px solid var(--border);border-radius:5px;font-family:var(--mono);font-size:12px;background:var(--bg)" data-ep="${idx}" data-param="${e.placeholder}" class="ep-extra" data-req="${isReq}" data-type="select">`;
      e.options.forEach((o, i) => {
        const label = o === "" ? "(none)" : o;
        html += `<option value="${o}"${i === 0 ? " selected" : ""}>${label}</option>`;
      });
      html += `</select>`;
    } else {
      const inputType = e.type === "integer" ? "number" : "text";
      html += `<input id="${e.id}" type="${inputType}" placeholder="${e.placeholder}" style="flex:1;min-width:0;padding:6px 10px;border:1px solid var(--border);border-radius:5px;font-family:var(--mono);font-size:12px" data-ep="${idx}" data-param="${e.placeholder}" class="ep-extra" data-req="${isReq}" data-type="${e.type || "string"}">`;
    }
    html += `</div>`;
  });
  html += "</div></div>";
  return html;
}

let flatEps = [];

  card.classList.toggle("open");

    // Auto-fill user_id fields from resolved lookup
    if (resolvedUserId) setTimeout(() => autoFillUserIds(), 0);
  }
  refreshCurl(idx);
}

function autoFillGlobals(idx) {
  const ep = flatEps[idx];
  const g = globals();
  (ep.extra || []).forEach(e => {
    if (!e.global) return;
    const el = $id(e.id);
    if (!el) return;
    const val = g[e.global] || "";
    // Only auto-fill if empty or was previously auto-filled
    if (!el.value.trim() || el.dataset.autoFilled === "yes") {
      if (val) {
        el.value = val;
        el.dataset.autoFilled = "yes";
        el.classList.add("auto-filled");
      }
    }
  });
}

function refreshCurl(idx) {

async function sendStreamReq(idx) {
  const ep = flatEps[idx];
  const g = globals();

  const errors = validateEndpoint(idx);
  if (errors.length) { toast("Required: " + errors.join(", ")); return; }

  if (!proxyAvailable) {
    copyCurl(idx);
    const pasteEl = $id("paste-" + idx);
    const fmtBtn = $id("btn-fmt-" + idx);
    pasteEl.classList.add("visible");
    fmtBtn.classList.add("visible");
    pasteEl.focus();
    toast("Curl copied! Paste terminal output below");
    return;
  }

  const panel = $id("stream-" + idx);
  const statusEl = $id("stream-status-" + idx);
  const metaEl = $id("stream-meta-" + idx);
  const outEl = $id("stream-output-" + idx);
  const rawEl = $id("stream-raw-" + idx);

  panel.classList.add("visible");
  statusEl.textContent = "STREAMING";
  statusEl.className = "stream-status streaming";
  metaEl.textContent = "0 tokens";
  outEl.innerHTML = '<span class="cursor"></span>';
  rawEl.textContent = "";

  const url = resolvedUrl(ep);
  const body = resolvedBody(ep);

  const t0 = performance.now();
  let tokenCount = 0;
  let assembledText = "";
  let finalData = null;

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { "x-api-key": g.apiKey, "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const errText = await res.text();
      statusEl.textContent = res.status;
      statusEl.className = "stream-status err";
      metaEl.textContent = Math.round(performance.now() - t0) + " ms";
      outEl.textContent = errText;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop(); // keep incomplete line in buffer

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith("data: ")) continue;

        const jsonStr = trimmed.slice(6);
        rawEl.textContent += trimmed + "\n";

        try {
          const chunk = JSON.parse(jsonStr);
          const token = chunk.current_token;

          if (token === "[DONE]") {
            // Final chunk with full text and metadata
            finalData = chunk;
            assembledText = chunk.text || assembledText;
          } else if (token) {
            assembledText += token;
            tokenCount++;
            // Update live display — remove cursor, add token, re-add cursor
            outEl.innerHTML = escHtml(assembledText) + '<span class="cursor"></span>';
            metaEl.textContent = tokenCount + " tokens";
          }
        } catch {}
      }
    }

    // Done streaming
    const ms = Math.round(performance.now() - t0);
    statusEl.textContent = "DONE";
    statusEl.className = "stream-status done";
    metaEl.textContent = tokenCount + " tokens · " + ms + " ms";
    outEl.textContent = assembledText; // remove cursor

    // Append final metadata to raw panel
    if (finalData) {
      rawEl.textContent += "\n── Final payload ──\n" + JSON.stringify(finalData, null, 2);
    }

  } catch (err) {
    const ms = Math.round(performance.now() - t0);
    statusEl.textContent = "ERR";
    statusEl.className = "stream-status err";
    metaEl.textContent = ms + " ms";
    outEl.textContent = err.message + "\n\nProxy may be down. Restart with: python3 docs/serve.py";
  }
}

function validateEndpoint(idx) {
  const ep = flatEps[idx];
  const g = globals();
  const errors = [];

  // Clear previous
  document.querySelectorAll(".field-invalid").forEach(el => el.classList.remove("field-invalid"));

  // API key always required
  if (!g.apiKey) { errors.push("API key"); $id("apiKey").classList.add("field-invalid"); }

  // Email needed?
  const needsEmail = (ep.query || []).some(p => p.name === "email" && p.req)
                  || (ep.body || []).some(p => (p.name === "email" || p.name === "user_email") && p.req);
  if (needsEmail && !g.userEmail) {
    errors.push("User email"); $id("userEmail").classList.add("field-invalid");
  }

  // Required extras (all extras are required unless explicitly req: false)
  (ep.extra || []).forEach(e => {
    if (e.req !== false) {
      const el = $id(e.id);
      if (el) {
        const val = el.value.trim();
        // For global fields, also check the top-bar value
        if (!val && e.global) {
          const gv = globals()[e.global] || "";
          if (gv) return; // global has a value, skip validation
        }
        if (!val) { errors.push(e.label); el.classList.add("field-invalid"); }
      }
    }
  });

  return errors;
}

async function sendReq(idx) {
  const ep = flatEps[idx];
  // Route stream endpoints to the streaming handler
  if (ep.stream) { sendStreamReq(idx); return; }
  const g = globals();

  // Validate required fields
  const errors = validateEndpoint(idx);
  if (errors.length) { toast("Required: " + errors.join(", ")); return; }

  // In static mode: copy curl and show paste area instead
  if (!proxyAvailable) {
    copyCurl(idx);
    const pasteEl = $id("paste-" + idx);
    const fmtBtn = $id("btn-fmt-" + idx);
    pasteEl.classList.add("visible");
    fmtBtn.classList.add("visible");
    pasteEl.focus();
    toast("Curl copied! Paste terminal output below");
    return;
  }

  const panel = $id("resp-" + idx);
  const statusEl = $id("resp-status-" + idx);
  const timeEl = $id("resp-time-" + idx);
  const bodyEl = $id("resp-body-" + idx);
  panel.classList.add("visible");
  statusEl.textContent = "...";
  statusEl.className = "status-code";
  timeEl.textContent = "";
  bodyEl.textContent = "Sending...";

  const url = resolvedUrl(ep);
  const body = resolvedBody(ep);
  const opts = {
    method: ep.method,
    headers: { "x-api-key": g.apiKey, "Content-Type": "application/json" },
  };
  if (body && Object.keys(body).length > 0 && ep.method !== "GET") opts.body = JSON.stringify(body);

  const t0 = performance.now();
  try {
    const res = await fetch(url, opts);
    const ms = Math.round(performance.now() - t0);
    const text = await res.text();
    let pretty = text;
    try { pretty = JSON.stringify(JSON.parse(text), null, 2); } catch {}

    statusEl.textContent = res.status;
    statusEl.className = "status-code " + (res.status < 300 ? "s2xx" : res.status < 500 ? "s4xx" : "s5xx");
    timeEl.textContent = ms + " ms";
    bodyEl.textContent = pretty;
  } catch (err) {
    const ms = Math.round(performance.now() - t0);
    statusEl.textContent = "ERR";
    statusEl.className = "status-code serr";
    timeEl.textContent = ms + " ms";
    bodyEl.textContent = err.message + "\n\nProxy may be down. Restart with: python3 docs/serve.py";
  }
}

function formatPaste(idx) {
  const pasteEl = $id("paste-" + idx);
  const raw = pasteEl.value.trim();
  if (!raw) { toast("Paste your terminal output first"); return; }

  const panel = $id("resp-" + idx);
  const statusEl = $id("resp-status-" + idx);
  const timeEl = $id("resp-time-" + idx);
  const bodyEl = $id("resp-body-" + idx);
  panel.classList.add("visible");

  // Try to extract HTTP status from curl output (e.g. "HTTP/2 200" or "HTTP/1.1 422")
  const statusMatch = raw.match(/HTTP\/[\d.]+ (\d{3})/);
  const code = statusMatch ? parseInt(statusMatch[1], 10) : 0;

  // Try to find JSON in the output
  let pretty = raw;
  const jsonMatch = raw.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
  if (jsonMatch) {
    try { pretty = JSON.stringify(JSON.parse(jsonMatch[0]), null, 2); } catch { pretty = raw; }
  }

  if (code) {
    statusEl.textContent = code;
    statusEl.className = "status-code " + (code < 300 ? "s2xx" : code < 500 ? "s4xx" : "s5xx");
  } else {
    statusEl.textContent = "???";
    statusEl.className = "status-code";
  }
  timeEl.textContent = "pasted";
  bodyEl.textContent = pretty;
  toast("Formatted!");
}

/* ── Voice Chat Widget ── */
(function() {
  let vwConvId = null;
  let vwSending = false;
  let vwAudioCtx = null;
  let vwCurrentSource = null;
  let vwCurrentPlayIdx = null;
  const vwBuffers = [];

  window.toggleVoiceWidget = function() {
    const w = $id("voiceWidget");
    w.classList.toggle("open");
  };

  function vwGetAudioCtx() {
    if (!vwAudioCtx) vwAudioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
    return vwAudioCtx;
  }

  function vwPcmToBuffer(pcm) {
    const ctx = vwGetAudioCtx();
    const int16 = new Int16Array(pcm);
    const f32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) f32[i] = int16[i] / 32768;
    const buf = ctx.createBuffer(1, f32.length, 24000);
    buf.copyToChannel(f32, 0);
    return buf;
  }

  function vwFmtTime(s) { return Math.floor(s/60) + ":" + String(Math.floor(s%60)).padStart(2,"0"); }

  function vwScrollBottom() {
    const c = $id("vwChat");
    if (c) requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
  }

  function vwAddUserBubble(text) {
    const d = document.createElement("div");
    d.className = "vw-msg user";
    d.innerHTML = `<div class="vw-bubble">${escHtml(text)}</div><div class="vw-meta">You</div>`;
    $id("vwChat").appendChild(d);
    vwScrollBottom();
  }

  function vwAddLoading() {
    const d = document.createElement("div");
    d.className = "vw-msg clone";
    d.id = "vw-loading";
    d.innerHTML = `<div class="vw-bubble"><div class="vw-loading"><span></span><span></span><span></span></div></div>`;
    $id("vwChat").appendChild(d);
    vwScrollBottom();
  }

  function vwShowStreamingPlayer(audioIdx) {
    const ld = $id("vw-loading");
    if (ld) ld.remove();
    const d = document.createElement("div");
    d.className = "vw-msg clone";
    d.innerHTML = `
      <div class="vw-bubble">
        <div class="vw-audio-player" id="vw-player-${audioIdx}">
          <button onclick="vwTogglePlay(${audioIdx})" id="vw-play-${audioIdx}" disabled>&#9654;</button>
          <div class="vw-progress-wrap" onclick="vwSeek(event,${audioIdx})">
            <div class="vw-progress-bar" id="vw-bar-${audioIdx}"></div>
          </div>
          <span class="vw-stream-dot" id="vw-sdot-${audioIdx}" style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:vwPulse 1s infinite;flex-shrink:0"></span>
          <span class="vw-dur" id="vw-dur-${audioIdx}">0:00</span>
        </div>
      </div>
      <div class="vw-meta" id="vw-meta-${audioIdx}">Streaming...</div>`;
    $id("vwChat").appendChild(d);
    vwScrollBottom();
  }

  function vwFinalizePlayer(audioIdx, duration) {
    const dot = $id("vw-sdot-" + audioIdx); if (dot) dot.remove();
    const dur = $id("vw-dur-" + audioIdx); if (dur) dur.textContent = vwFmtTime(duration);
    const meta = $id("vw-meta-" + audioIdx); if (meta) meta.textContent = "Clone \u00b7 " + vwFmtTime(duration);
    const btn = $id("vw-play-" + audioIdx); if (btn) btn.disabled = false;
  }

  function vwReplaceLoadingError(err) {
    const ld = $id("vw-loading");
    if (ld) ld.remove();
    const d = document.createElement("div");
    d.className = "vw-msg clone";
    d.innerHTML = `<div class="vw-bubble vw-error">${escHtml(err)}</div><div class="vw-meta">Error</div>`;
    $id("vwChat").appendChild(d);
    vwScrollBottom();
  }

  function vwPcmToFloat32(bytes) {
    const int16 = new Int16Array(bytes.buffer, bytes.byteOffset, bytes.byteLength / 2);
    const f32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) f32[i] = int16[i] / 32768;
    return f32;
  }

  // AudioWorklet for streaming playback
  const VW_WORKLET_CODE = `
  class S extends AudioWorkletProcessor {
    constructor() {
      super();
      this.q = []; this.c = null; this.p = 0; this.live = true;
      this.port.onmessage = (e) => {
        if (e.data === 'stop') { this.live = false; this.q = []; this.c = null; }
        else this.q.push(e.data);
      };
    }
    process(_, outputs) {
      if (!this.live) return false;
      const o = outputs[0][0];
      let w = 0;
      while (w < o.length) {
        if (!this.c || this.p >= this.c.length) {
          if (!this.q.length) { for (; w < o.length; w++) o[w] = 0; return true; }
          this.c = this.q.shift(); this.p = 0;
        }
        const n = Math.min(this.c.length - this.p, o.length - w);
        o.set(this.c.subarray(this.p, this.p + n), w);
        w += n; this.p += n;
      }
      return true;
    }
  }
  registerProcessor('vw-pcm-stream', S);
  `;
  let vwWorkletReady = false;
  async function vwEnsureWorklet() {
    if (vwWorkletReady) return;
    const ctx = vwGetAudioCtx();
    const url = URL.createObjectURL(new Blob([VW_WORKLET_CODE], { type: 'application/javascript' }));
    await ctx.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);
    vwWorkletReady = true;
  }

  function vwStopAudio() {
    if (vwCurrentPlayIdx !== null) {
      const entry = vwBuffers[vwCurrentPlayIdx];
      if (entry && entry.worklet) {
        try { entry.worklet.port.postMessage('stop'); entry.worklet.disconnect(); } catch {}
        entry.worklet = null;
      }
    }
    if (vwCurrentSource) { try { vwCurrentSource.stop(); } catch {} vwCurrentSource = null; }
    if (vwCurrentPlayIdx !== null) {
      const b = $id("vw-play-" + vwCurrentPlayIdx); if (b) b.innerHTML = "&#9654;";
      const r = $id("vw-bar-" + vwCurrentPlayIdx); if (r) r.style.width = "0%";
      vwCurrentPlayIdx = null;
    }
  }

  window.vwTogglePlay = function(idx) {
    if (vwCurrentPlayIdx === idx) { vwStopAudio(); return; }
    vwStopAudio();
    vwPlayAudio(idx, 0);
  };

  function vwPlayAudio(idx, offset) {
    const entry = vwBuffers[idx];
    if (!entry || !entry.buffer) return;
    const ctx = vwGetAudioCtx();
    if (ctx.state === "suspended") ctx.resume();
    const src = ctx.createBufferSource();
    src.buffer = entry.buffer;
    src.connect(ctx.destination);
    vwCurrentSource = src;
    vwCurrentPlayIdx = idx;
    const btn = $id("vw-play-" + idx);
    const bar = $id("vw-bar-" + idx);
    if (btn) btn.innerHTML = "&#9724;";
    const t0 = ctx.currentTime;
    const dur = entry.buffer.duration;
    function tick() {
      if (vwCurrentPlayIdx !== idx) return;
      const e = ctx.currentTime - t0 + offset;
      if (bar) bar.style.width = Math.min(100, e / dur * 100) + "%";
      if (e < dur) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
    src.onended = () => {
      if (vwCurrentPlayIdx === idx) {
        if (btn) btn.innerHTML = "&#9654;";
        if (bar) bar.style.width = "0%";
        vwCurrentSource = null;
        vwCurrentPlayIdx = null;
      }
    };
    src.start(0, offset);
  }

  window.vwSeek = function(ev, idx) {
    const entry = vwBuffers[idx];
    if (!entry || !entry.buffer) return;
    const r = ev.currentTarget.getBoundingClientRect();
    const offset = ((ev.clientX - r.left) / r.width) * entry.buffer.duration;
    vwStopAudio();
    vwPlayAudio(idx, offset);
  };

  // ── Debug Panel ──
  let vwDbgT0 = 0, vwDbgChunks = 0, vwDbgBytes = 0;

  window.vwToggleDebug = function() {
    const p = $id("vwDbgPanel"), b = $id("vwDbgToggle");
    if (!p) return;
    const show = !p.classList.contains("visible");
    p.classList.toggle("visible", show);
    if (b) b.classList.toggle("active", show);
  };

  window.vwClearDbg = function() {
    const log = $id("vwDbgLog"); if (log) log.innerHTML = "";
    vwDbgChunks = 0; vwDbgBytes = 0;
    const el = (id, v) => { const e = $id(id); if (e) e.textContent = v; };
    el("vwDbgChunks", "0"); el("vwDbgBytes", "0"); el("vwDbgDur", "0.0s"); el("vwDbgLat", "\u2014");
  };

  function vwDbg(label, cls, msg) {
    const log = $id("vwDbgLog"); if (!log) return;
    const el = document.createElement("div");
    el.className = "vw-dbg-entry";
    const t = vwDbgT0 ? ((performance.now() - vwDbgT0) / 1000).toFixed(3) : "0.000";
    el.innerHTML = `<span class="ts">${t}s</span> <span class="lb ${cls}">[${label}]</span> ${msg}`;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  }

  function vwDbgStats() {
    const el = (id, v) => { const e = $id(id); if (e) e.textContent = v; };
    el("vwDbgChunks", vwDbgChunks);
    el("vwDbgBytes", vwDbgBytes >= 1024 ? (vwDbgBytes / 1024).toFixed(1) + " KB" : vwDbgBytes);
    el("vwDbgDur", (vwDbgBytes / 48000).toFixed(2) + "s");
  }

  async function vwStreamAndPlay(response, audioIdx) {
    const ctx = vwGetAudioCtx();
    if (ctx.state === "suspended") await ctx.resume();
    await vwEnsureWorklet();

    const worklet = new AudioWorkletNode(ctx, 'vw-pcm-stream');
    worklet.connect(ctx.destination);

    vwDbgT0 = performance.now();
    vwDbgChunks = 0; vwDbgBytes = 0;
    vwClearDbg();
    vwDbg("INFO", "info", "AudioContext sampleRate: " + ctx.sampleRate);
    vwDbg("INFO", "info", "Reading stream body...");
    vwDbg("INFO", "info", "Content-Type: " + (response.headers.get("content-type") || "?"));
    vwDbg("INFO", "info", "Transfer-Encoding: " + (response.headers.get("transfer-encoding") || "none"));
    vwDbg("INFO", "info", "Content-Length: " + (response.headers.get("content-length") || "none (chunked)"));

    const reader = response.body.getReader();
    const allChunks = [];
    let leftover = new Uint8Array(0);
    let totalSamples = 0;
    vwCurrentPlayIdx = audioIdx;
    vwBuffers[audioIdx] = { buffer: null, streaming: true, worklet };
    vwShowStreamingPlayer(audioIdx);

    const streamStart = ctx.currentTime;
    function tick() {
      if (vwCurrentPlayIdx !== audioIdx) return;
      const d = $id("vw-dur-" + audioIdx);
      if (d) d.textContent = vwFmtTime(ctx.currentTime - streamStart);
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    while (true) {
      const { done, value } = await reader.read();
      if (done) { vwDbg("DONE", "done", `Stream ended \u2014 ${vwDbgChunks} chunks, ${vwDbgBytes} bytes`); break; }
      vwDbgChunks++;
      vwDbgBytes += value.length;
      if (vwDbgChunks === 1) {
        const lat = (performance.now() - vwDbgT0).toFixed(0);
        const e = $id("vwDbgLat"); if (e) e.textContent = lat + "ms";
      }
      vwDbg("CHUNK", "chunk", `#${vwDbgChunks} \u2014 ${value.length} bytes (total: ${vwDbgBytes})`);
      vwDbgStats();
      let combined;
      if (leftover.length > 0) {
        combined = new Uint8Array(leftover.length + value.length);
        combined.set(leftover);
        combined.set(value, leftover.length);
      } else {
        combined = value;
      }
      const usable = combined.length - (combined.length % 2);
      leftover = combined.length % 2 ? combined.slice(usable) : new Uint8Array(0);
      if (usable === 0) continue;

      const chunk = combined.slice(0, usable);
      allChunks.push(chunk);
      const f32 = vwPcmToFloat32(chunk);
      totalSamples += f32.length;
      worklet.port.postMessage(f32);
      vwDbg("PLAY", "play", `Pushed ${f32.length} samples (${(f32.length/24000*1000).toFixed(0)}ms) to worklet`);
    }

    // Build full buffer for replay/seek
    const totalLen = allChunks.reduce((s, c) => s + c.length, 0);
    const merged = new Uint8Array(totalLen);
    let off = 0;
    for (const c of allChunks) { merged.set(c, off); off += c.length; }
    const fullBuffer = vwPcmToBuffer(merged.buffer);
    vwBuffers[audioIdx] = { buffer: fullBuffer, streaming: false, worklet };
    vwDbg("DONE", "done", `Buffer: ${fullBuffer.duration.toFixed(2)}s (${totalLen} bytes, ${vwDbgChunks} chunks)`);
    vwDbgStats();
    vwFinalizePlayer(audioIdx, fullBuffer.duration);

    // Let worklet finish draining, then clean up
    const elapsed = ctx.currentTime - streamStart;
    const remaining = Math.max(0, fullBuffer.duration - elapsed);
    setTimeout(() => {
      try { worklet.port.postMessage('stop'); worklet.disconnect(); } catch {}
      if (vwBuffers[audioIdx]) vwBuffers[audioIdx].worklet = null;
      if (vwCurrentPlayIdx === audioIdx) vwCurrentPlayIdx = null;
    }, remaining * 1000 + 500);
  }

  window.vwNewConversation = function() {
    vwConvId = null;
    $id("vwChat").innerHTML = "";
    vwBuffers.length = 0;
    vwStopAudio();
  };

  window.vwSend = async function() {
    const input = $id("vwInput");
    const text = input.value.trim();
    if (!text || vwSending) return;
    const g = globals();
    if (!g.apiKey) { $id("apiKey").focus(); $id("apiKey").classList.add("field-invalid"); return; }
    if (!proxyAvailable) { toast("Start proxy first: python3 docs/serve.py"); return; }

    vwSending = true;
    $id("vwBtnSend").disabled = true;
    input.value = "";
    vwAddUserBubble(text);
    vwAddLoading();

    try {
      if (!vwConvId) {
        const convBody = {};
        const cr = await fetch("/api/v3/conversation", {
          method: "POST",
          headers: { "x-api-key": g.apiKey, "Content-Type": "application/json" },
          body: JSON.stringify(convBody),
        });
        if (!cr.ok) throw new Error("Conversation create failed: HTTP " + cr.status);
        const cd = await cr.json();
        vwConvId = cd.conversation_id;
      }
      vwDbgT0 = performance.now();
      vwDbg("INFO", "info", "POST /api/v3/voice/stream \u2014 sending...");
      const vr = await fetch("/api/v3/voice/stream", {
        method: "POST",
        headers: { "x-api-key": g.apiKey, "Content-Type": "application/json" },
        body: JSON.stringify({ conversation_id: vwConvId, message: text }),
      });
      vwDbg("INFO", "info", `Response: HTTP ${vr.status} in ${(performance.now() - vwDbgT0).toFixed(0)}ms`);
      if (!vr.ok) {
        let et = "HTTP " + vr.status;
        try { const ej = await vr.json(); et += ": " + (ej.error || ej.message || JSON.stringify(ej)); } catch {}
        vwDbg("ERR", "err", et);
        vwReplaceLoadingError(et);
        return;
      }
      const audioIdx = vwBuffers.length;
      await vwStreamAndPlay(vr, audioIdx);
    } catch (e) {
      vwReplaceLoadingError(e.message);
    } finally {
      vwSending = false;
      $id("vwBtnSend").disabled = false;
      input.focus();
    }
  };

  // Enter key
  document.addEventListener("keydown", (e) => {
    if (e.target.id === "vwInput" && e.key === "Enter" && !e.shiftKey) { e.preventDefault(); vwSend(); }
  });

  // Push-to-talk mic
  let vwRecognition = null;
  let vwRecording = false;

  window.vwMicStart = function() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { $id("vwInput").placeholder = "Mic not supported \u2014 type your message instead"; $id("vwBtnMic").style.opacity = ".4"; return; }
    if (vwRecording) return;
    vwRecording = true;
    $id("vwBtnMic").classList.add("recording");
    vwRecognition = new SR();
    vwRecognition.continuous = false;
    vwRecognition.interimResults = true;
    vwRecognition.lang = "en-US";
    vwRecognition.onresult = (e) => {
      let t = "";
      for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
      $id("vwInput").value = t;
    };
    vwRecognition.onerror = () => { vwRecording = false; $id("vwBtnMic").classList.remove("recording"); };
    vwRecognition.onend = () => {
      vwRecording = false;
      $id("vwBtnMic").classList.remove("recording");
      if ($id("vwInput").value.trim()) vwSend();
    };
    vwRecognition.start();
  };

  window.vwMicStop = function() {
    if (vwRecognition && vwRecording) vwRecognition.stop();
  };
})();

/* ── Init ── */
renderAll();

// Persist inputs to localStorage
["apiKey", "userEmail"].forEach(id => {
  const el = $id(id);
  const saved = localStorage.getItem("delphi_" + id);
  if (saved) el.value = saved;
  el.addEventListener("input", () => localStorage.setItem("delphi_" + id, el.value));
});

// Refresh curls on extra-field changes, clear validation, handle manual override of auto-fill
function handleExtraChange(e) {
  if (e.target.classList.contains("field-invalid")) e.target.classList.remove("field-invalid");
  if (e.target.classList.contains("ep-extra")) {
    // If user manually edits an auto-filled field, remove auto-fill marker
    if (e.target.dataset.autoFilled === "yes") {
      e.target.dataset.autoFilled = "";
      e.target.classList.remove("auto-filled");
    }
    const idx = parseInt(e.target.dataset.ep, 10);
    if (!isNaN(idx)) refreshCurl(idx);
  }
}
document.addEventListener("input", handleExtraChange);
document.addEventListener("change", handleExtraChange);

// Refresh curls on global input changes & clear validation
["apiKey", "userEmail"].forEach(id => {
  $id(id).addEventListener("input", () => {
    $id(id).classList.remove("field-invalid");
    document.querySelectorAll(".endpoint.open").forEach(el => {
      const idx = parseInt(el.id.replace("ep-", ""), 10);
      refreshCurl(idx);
    });
    // Re-lookup when API key or email changes
    if (id === "apiKey" || id === "userEmail") debouncedLookup();
  });
});

// Initial lookup if we already have stored values
detectProxy().then(() => {
  updateModeBanner();
  if (globals().apiKey && globals().userEmail) lookupUser();
});
</script>
</body>
</html>
